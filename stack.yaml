services:
  nginx:
    image: nginx:stable

    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress

      - target: 443
        published: 443
        protocol: tcp
        mode: ingress

    volumes:
      - /storage/edge-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - /storage/edge-gateway/conf.d:/etc/nginx/conf.d:ro
      - /storage/edge-gateway/certs:/etc/nginx/certs:ro
      - /storage/edge-gateway/logs:/var/log/nginx

    networks:
      - edge_network

    deploy:
      replicas: 1

      placement:
        constraints:
          - node.role == manager

      restart_policy:
        condition: any
        delay: 5s
        max_attempts: 3
        window: 30s

      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback

      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first

      resources:
        limits:
          cpus: "1.00"
          memory: 512M

        reservations:
          cpus: "0.25"
          memory: 128M

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  edge_network:
    external: true
